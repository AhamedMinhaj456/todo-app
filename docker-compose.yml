version: "3.8"

services:
  db:
    image: mysql:8
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo_app
    ports:
      - "3206:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend-test:
    image: maven:3.9.6-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: mvn clean test

  backend:
    build: ./backend
    container_name: todo-backend
    depends_on:
      - db
    ports:
      - "8050:8050"

  frontend:
    build: ./frontend
    container_name: todo-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
  frontend-test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run test:coverage"
volumes:
  mysql_data:
